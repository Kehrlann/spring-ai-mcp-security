server:
  port: ${PORT:8080}
  servlet:
    session:
      persistent: true

spring:
  security:
    oauth2:
      client:
        registration:
          authserver:
            client-name: Spring Auth Server
            client-id: "default-client"
            client-secret: "default-secret"
            scope:
              - openid
              - email
        provider:
          authserver:
            issuer-uri: ${ISSUER_URI:http://localhost:9000}

  sql:
    init:
      mode: always
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./appointments
    username: sa
    password:

